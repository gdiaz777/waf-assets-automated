
configuration:
  profile: "test profile"
  region: "eu-west-1"

assets:
  - name: "test1"
    domain: "https://example1.es, https://example11.es, https://example111.com"
    owncertificate: true
    upstream: "https://httpbin.org"

  - name: "test2"
    domain: "https://example2.es, https://example22.es"
    owncertificate: false
    upstream: "https://httpbin.org"

  # Optional: 'host' rewrites the Host header sent to the upstream. Useful
  # when the upstream LB matches a different hostname than what clients use
  # (e.g. AWS ELB virtual host routing).
  - name: "test3"
    domain: "https://example3.es"
    owncertificate: false
    upstream: "https://internal-lb-1234567890.us-east-1.elb.amazonaws.com"
    host: "example3.es"
